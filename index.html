<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 챗봇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #1f6feb;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --user-bg:   #1f6feb;
      --ai-bg:     #21262d;
      --radius:    14px;
      --font:      'Noto Sans KR', sans-serif;
      --mono:      'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      height: min(90dvh, 820px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(88,166,255,0.06);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(22,27,34,0.95);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .header-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
      50%      { opacity: .6; box-shadow: 0 0 14px var(--accent); }
    }

    .header-title {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .header-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .header-model {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      background: rgba(88,166,255,0.1);
      border: 1px solid rgba(88,166,255,0.2);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── API setup banner ── */
    #api-banner {
      margin: 12px 16px 0;
      background: rgba(31,111,235,0.1);
      border: 1px solid rgba(31,111,235,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem;
      color: #79c0ff;
      flex-shrink: 0;
    }
    #api-banner a { color: var(--accent); }
    #api-banner.hidden { display: none; }

    .key-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .key-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text);
      outline: none;
    }
    .key-row input:focus { border-color: var(--accent); }
    .key-row button {
      background: var(--accent2);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-family: var(--font);
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .key-row button:hover { background: var(--accent); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-wrap {
      display: flex;
      gap: 10px;
      animation: fadeUp .22s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-wrap.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.ai   { background: var(--surface2); border: 1px solid var(--border); }
    .avatar.user { background: var(--accent2); }

    .bubble {
      max-width: 75%;
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ai   .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .user .bubble {
      background: var(--user-bg);
      border-top-right-radius: 4px;
      color: #fff;
    }

    /* typing dots */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 4px 2px;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dotBounce 1.3s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes dotBounce {
      0%,80%,100% { transform: translateY(0);  opacity: .5; }
      40%          { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 16px;
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.55;
      transition: border-color .15s;
    }
    #user-input::placeholder { color: var(--text-muted); }
    #user-input:focus { border-color: var(--accent2); }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--accent2);
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #send-btn:hover:not(:disabled)  { background: var(--accent); }
    #send-btn:active:not(:disabled) { transform: scale(.94); }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Footer hint ── */
    .footer-hint {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 0 16px 10px;
      flex-shrink: 0;
    }

    /* ── Suggested prompts ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 18px 4px;
    }
    .sug-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font);
      transition: border-color .15s, color .15s;
    }
    .sug-btn:hover { border-color: var(--accent2); color: var(--text); }

    @media (max-width: 500px) {
      .bubble { max-width: 88%; }
      header { padding: 12px 16px; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="header-dot"></div>
    <div>
      <div class="header-title">AI 챗봇</div>
      <div class="header-sub">무료 · 오픈소스 · GitHub Pages</div>
    </div>
    <div class="header-model" id="model-badge">llama-3.1-8b</div>
  </header>

  <!-- API Key Banner -->
  <div id="api-banner">
    <strong>🔑 Groq API 키가 필요합니다</strong> —
    <a href="https://console.groq.com" target="_blank">console.groq.com</a>에서 무료로 발급받으세요. (가입 후 즉시 사용 가능)
    <div class="key-row">
      <input type="password" id="api-key-input" placeholder="gsk_로 시작하는 API 키 붙여넣기">
      <button onclick="saveKey()">저장</button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="msg-wrap ai">
      <div class="avatar ai">🤖</div>
      <div class="bubble">안녕하세요! 무엇이든 물어보세요.<br>한국어, 영어 모두 가능합니다 😊</div>
    </div>
  </div>

  <!-- Suggested prompts -->
  <div class="suggestions" id="suggestions">
    <button class="sug-btn" onclick="useSuggestion('오늘 할 일 목록 작성 도와줘')">📝 할 일 목록</button>
    <button class="sug-btn" onclick="useSuggestion('이메일 초안 작성해줘')">✉️ 이메일 작성</button>
    <button class="sug-btn" onclick="useSuggestion('한국어를 영어로 번역해줘')">🌐 번역</button>
    <button class="sug-btn" onclick="useSuggestion('코드 오류 디버깅 도와줘')">💻 코드 도움</button>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea id="user-input" rows="1"
      placeholder="메시지를 입력하세요... (Enter 전송 / Shift+Enter 줄바꿈)"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="전송">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="footer-hint">Powered by Groq · Llama 3 · 완전 무료</div>

</div>

<script>
  // ── 설정 ──────────────────────────────────────────
  const SYSTEM_PROMPT = '당신은 친절하고 유능한 AI 어시스턴트입니다. 항상 한국어로 답변하되, 사용자가 영어로 질문하면 영어로 답변하세요. 답변은 명확하고 간결하게 작성하세요.';
  const MODEL = 'llama-3.1-8b-instant';

  // ── 상태 ──────────────────────────────────────────
  let apiKey = sessionStorage.getItem('groq_key') || '';
  let history = [];
  let isLoading = false;

  const banner   = document.getElementById('api-banner');
  const msgEl    = document.getElementById('messages');
  const inputEl  = document.getElementById('user-input');
  const sendBtn  = document.getElementById('send-btn');
  const suggEl   = document.getElementById('suggestions');

  if (apiKey) banner.classList.add('hidden');

  // ── API 키 저장 ───────────────────────────────────
  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) { alert('API 키를 입력해주세요.'); return; }
    apiKey = val;
    sessionStorage.setItem('groq_key', apiKey);
    banner.classList.add('hidden');
    inputEl.focus();
  }

  // ── 자동 높이 조절 ────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── 키 이벤트 ─────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── 추천 질문 ─────────────────────────────────────
  function useSuggestion(text) {
    inputEl.value = text;
    autoResize(inputEl);
    suggEl.style.display = 'none';
    sendMessage();
  }

  // ── 메시지 추가 ───────────────────────────────────
  function addMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    msgEl.appendChild(wrap);
    msgEl.scrollTop = msgEl.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ai';
    wrap.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    msgEl.appendChild(wrap);
    msgEl.scrollTop = msgEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  // ── 메시지 전송 ───────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    if (!apiKey) {
      banner.classList.remove('hidden');
      document.getElementById('api-key-input').focus();
      return;
    }

    // 추천 버튼 숨기기
    suggEl.style.display = 'none';

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;

    addMsg('user', text);
    history.push({ role: 'user', content: text });

    addTyping();

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: MODEL,
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...history
          ],
          max_tokens: 1024,
          temperature: 0.7,
          stream: false
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content?.trim() || '응답을 받지 못했습니다.';

      history.push({ role: 'assistant', content: reply });

      removeTyping();
      addMsg('ai', reply);

      // 대화가 너무 길어지면 앞부분 잘라냄 (메모리 관리)
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      removeTyping();
      let msg = `⚠️ 오류가 발생했습니다: ${err.message}`;
      if (err.message.includes('401')) msg = '⚠️ API 키가 올바르지 않습니다. 키를 다시 확인해주세요.';
      if (err.message.includes('429')) msg = '⚠️ 요청이 너무 많습니다. 잠시 후 다시 시도해주세요.';
      addMsg('ai', msg);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
